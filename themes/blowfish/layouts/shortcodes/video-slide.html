<div class="snap-start shrink-0" style="width: 500px !important;">
    
    <div class="relative bg-black rounded-2xl overflow-hidden shadow-xl border border-neutral-200 dark:border-neutral-800" 
         style="height: 280px !important; width: 500px !important;">
        {{ .Inner }}
    </div>

    <div class="mt-5 px-1">
        {{ if .Get "title" }}
        <h3 class="text-xl font-extrabold m-0 p-0 text-neutral-800 dark:text-white tracking-tight">
            {{ .Get "title" }}
        </h3>
        {{ end }}
        
        {{ if .Get "caption" }}
        <p class="text-base text-neutral-500 dark:text-neutral-400 m-0 mt-2 p-0 leading-relaxed line-clamp-2">
            {{ .Get "caption" }}
        </p>
        {{ end }}
    </div>
</div>
